<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART RADIO ECOSYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            color: #111;
            overflow-x: hidden;
            line-height: 1.6;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 9999;
            border-bottom: 1px solid #eee;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 2px;
        }

        nav ul {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        nav a {
            text-decoration: none;
            color: #111;
            font-weight: 600;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #fff; /* Fondo 100% blanco plano, sin degradados */
            padding: 140px 40px 80px 40px;
        }

        .hero-content {
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero h1 {
            font-size: 7rem;
            font-weight: 800;
            line-height: .9;
            letter-spacing: -4px;
            margin-bottom: 30px;
        }

        .hero p {
            font-size: 1.4rem;
            color: #666;
            max-width: 900px;
            margin: auto;
            margin-bottom: 40px;
        }

        .hero .hero-images {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
            margin-top: 50px;
            margin-bottom: 40px;
        }

        .hero .hero-images img {
            max-width: 650px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }

        .btn {
            display: inline-block;
            padding: 18px 40px;
            background: #111;
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-weight: 700;
        }

        .section {
            padding: 140px 8%;
            background: #fff;
        }

        .center {
            text-align: center;
            max-width: 1000px;
            margin: auto;
            margin-bottom: 100px;
        }

        .center h2 {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }

        .center p {
            color: #666;
            font-size: 1.15rem;
        }

        .product {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
            margin-bottom: 160px;
        }

        .product img {
            width: 100%;
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, .08);
            background: #f0f0f0;
        }

        .product h3 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .tag {
            color: #0066ff;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .product p {
            color: #555;
            margin-bottom: 30px;
        }

        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .features div {
            background: #f7f7f7;
            padding: 14px;
            border-radius: 12px;
            font-size: .95rem;
        }

        .compare {
            padding: 140px 8%;
            background: #fff;
            color: #111;
        }

        .compare table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            color: black;
        }

        .compare th {
            background: #f5f5f7;
            color: #111;
            padding: 16px;
            font-weight: 700;
            border-bottom: 2px solid #eee;
        }

        .compare td {
            padding: 14px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        footer {
            background: #111;
            color: white;
            padding: 80px;
            text-align: center;
        }

        footer a {
            color: white;
            text-decoration: none;
        }

        @media(max-width:900px) {
            .hero h1 {
                font-size: 3.5rem;
            }
